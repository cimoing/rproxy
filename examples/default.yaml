profile:
  id: default
  name: Default
  enabled: true
  active_node: vmess-1
  active_route: bypass-lan

nodes:
  - id: http-1
    name: Example HTTP
    protocol: http
    server: http.example.com
    port: 8080
    options:
      username: user
      password: pass

  - id: socks-1
    name: Example SOCKS
    protocol: socks
    server: socks.example.com
    port: 1080
    options:
      username: user
      password: pass

  - id: vmess-1
    name: Example VMess
    protocol: vmess
    server: vmess.example.com
    port: 443
    options:
      uuid: 00000000-0000-0000-0000-000000000000
      alter_id: 0
      security: none
      tls: true
      transport: websocket
      websocket:
        path: /vmess
        host: vmess.example.com

proxy:
  http_listen: 127.0.0.1:7890
  socks_listen: 127.0.0.1:7891

system:
  tray: true
  auto_start: false

tun:
  enabled: false
  interface_name: rproxy-tun
  auto_route: true

pac:
  enabled: true
  listen: 127.0.0.1:7892

routing:
  mode: auto
  default_action: proxy
  geosite:
    enabled: true
    path: data/dlc.dat
    auto_update: false
  rules:
    - type: ip_cidr
      value: 8.8.8.8/32
      action: proxy
    - type: ip_cidr
      value: 8.8.4.4/32
      action: proxy
    - type: ip_cidr
      value: 1.1.1.1/32
      action: proxy
    - type: ip_cidr
      value: 1.0.0.1/32
      action: proxy
    - type: ip_cidr
      value: 9.9.9.9/32
      action: proxy
    - type: ip_cidr
      value: 149.112.112.112/32
      action: proxy
    - type: ip_cidr
      value: 208.67.222.222/32
      action: proxy
    - type: ip_cidr
      value: 208.67.220.220/32
      action: proxy
    - type: ip_cidr
      value: 10.0.0.0/8
      action: direct
    - type: ip_cidr
      value: 172.16.0.0/12
      action: direct
    - type: ip_cidr
      value: 192.168.0.0/16
      action: direct

routing_profiles:
  - id: bypass-lan
    name: 绕过局域网
    mode: auto
    default_action: proxy
    geosite:
      enabled: true
      path: data/dlc.dat
      auto_update: false
    rules:
      - type: ip_cidr
        value: 8.8.8.8/32
        action: proxy
      - type: ip_cidr
        value: 8.8.4.4/32
        action: proxy
      - type: ip_cidr
        value: 1.1.1.1/32
        action: proxy
      - type: ip_cidr
        value: 1.0.0.1/32
        action: proxy
      - type: ip_cidr
        value: 9.9.9.9/32
        action: proxy
      - type: ip_cidr
        value: 149.112.112.112/32
        action: proxy
      - type: ip_cidr
        value: 208.67.222.222/32
        action: proxy
      - type: ip_cidr
        value: 208.67.220.220/32
        action: proxy
      - type: ip_cidr
        value: 10.0.0.0/8
        action: direct
      - type: ip_cidr
        value: 172.16.0.0/12
        action: direct
      - type: ip_cidr
        value: 192.168.0.0/16
        action: direct

  - id: global-proxy
    name: 全局
    mode: global_proxy
    default_action: proxy
    geosite:
      enabled: true
      path: data/dlc.dat
      auto_update: false
    rules: []

  - id: bypass-cn-lan
    name: 绕过大陆及局域网
    mode: auto
    default_action: proxy
    geosite:
      enabled: true
      path: data/dlc.dat
      auto_update: false
    rules:
      - type: ip_cidr
        value: 8.8.8.8/32
        action: proxy
      - type: ip_cidr
        value: 8.8.4.4/32
        action: proxy
      - type: ip_cidr
        value: 1.1.1.1/32
        action: proxy
      - type: ip_cidr
        value: 1.0.0.1/32
        action: proxy
      - type: ip_cidr
        value: 9.9.9.9/32
        action: proxy
      - type: ip_cidr
        value: 149.112.112.112/32
        action: proxy
      - type: ip_cidr
        value: 208.67.222.222/32
        action: proxy
      - type: ip_cidr
        value: 208.67.220.220/32
        action: proxy
      - type: geosite
        value: cn
        action: direct
