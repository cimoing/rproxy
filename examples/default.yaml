profile:
  id: default
  name: Default
  enabled: true

nodes:
  - id: http-1
    name: Example HTTP
    protocol: http
    server: http.example.com
    port: 8080
    options:
      username: user
      password: pass

  - id: socks-1
    name: Example SOCKS
    protocol: socks
    server: socks.example.com
    port: 1080
    options:
      username: user
      password: pass

  - id: vless-1
    name: Example VLESS
    protocol: vless
    server: example.com
    port: 443
    options:
      uuid: 00000000-0000-0000-0000-000000000000
      tls: true
      transport: websocket
      websocket:
        path: /proxy
        host: example.com

  - id: vmess-1
    name: Example VMess
    protocol: vmess
    server: vmess.example.com
    port: 443
    options:
      uuid: 00000000-0000-0000-0000-000000000000
      alter_id: 0
      security: none
      tls: true
      transport: websocket
      websocket:
        path: /vmess
        host: vmess.example.com

proxy:
  http_listen: 127.0.0.1:7890
  socks_listen: 127.0.0.1:7891

system:
  tray: true
  auto_start: false

tun:
  enabled: false
  interface_name: rproxy-tun
  auto_route: true

pac:
  enabled: true
  listen: 127.0.0.1:7892

routing:
  mode: auto
  default_action: direct
  geosite:
    enabled: true
    path: data/dlc.dat
    auto_update: false
  rules:
    - type: geosite
      value: google
      action: proxy
    - type: geosite
      value: google@ads
      action: block
    - type: domain_suffix
      value: example.cn
      action: direct
    - type: ip_cidr
      value: 10.0.0.0/8
      action: direct
